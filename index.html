<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF Viewer</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #pdf-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #scrollable-area {
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      overflow-x: hidden;
    }

    #scrollable-area::-webkit-scrollbar {
      width: 10px;
    }

    #scrollable-area::-webkit-scrollbar-track {
      background: #333;
    }

    #scrollable-area::-webkit-scrollbar-thumb {
      background: #666;
      border-radius: 5px;
    }

    #scrollable-area::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    #pages-wrapper {
      padding: 20px;
    }

    .page-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
    }

    /* Show only 30% of PDF */
    .page-mask {
      position: absolute;
      top: 30%;
      left: 0;
      width: 100%;
      height: 70%;
      background: black;
      pointer-events: none;
      z-index: 100;
    }

    /* watermark */
    .page-watermark {
      position: absolute;
      top: 40%;
      left: 20%;
      font-size: 28px;
      opacity: 0.2;
      color: white;
      transform: rotate(-30deg);
      pointer-events: none;
      z-index: 101;
      width: 60%;
      text-align: center;
    }

    #error-message {
      color: red;
      text-align: center;
      padding: 20px;
      font-size: 18px;
    }

    #loading {
      text-align: center;
      padding: 40vh 20px;
      font-size: 18px;
    }

    .controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.9);
      padding: 15px;
      border-radius: 5px;
      z-index: 1000;
      border: 1px solid #444;
    }

    .controls button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 15px;
      margin: 5px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }

    .controls button:hover {
      background: #0056b3;
    }

    #page-info {
      text-align: center;
      color: #888;
      font-size: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #444;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div id="pdf-container">
  <div id="scrollable-area">
    <div id="loading">Loading PDF...</div>
    <div id="error-message"></div>
    <div id="pages-wrapper"></div>
  </div>
</div>

<div class="controls">
  <div id="page-info">Page <span id="current-page">0</span> of <span id="total-pages">0</span></div>
  <button onclick="previousPage()">← Previous</button>
  <button onclick="nextPage()">Next →</button>
  <button onclick="scrollToTop()">↑ Top</button>
</div>

<script>
/* 🔥 IMPORTANT: Use raw GitHub URL or direct PDF link */
const url = "https://raw.githubusercontent.com/sahilcopvt-sudo/secure-pdf/main/ilovepdf_merged%20(1).pdf";

/* 👤 Watermark */
let mobile = "User";
let session = Math.random().toString(36).substring(2,8).toUpperCase();

let pdfDoc = null;
let currentPageNum = 1;
let totalPages = 0;

/* 📄 PDF load */
pdfjsLib.getDocument(url).promise.then(function(pdf) {
  pdfDoc = pdf;
  totalPages = pdf.numPages;
  document.getElementById('total-pages').textContent = totalPages;
  document.getElementById('loading').style.display = 'none';
  
  renderAllPages();
  
}).catch(function(error) {
  document.getElementById('error-message').innerHTML = "Error loading PDF: " + error.message;
  document.getElementById('loading').style.display = 'none';
  console.error("PDF load error:", error);
});

function renderAllPages() {
  const wrapper = document.getElementById('pages-wrapper');
  wrapper.innerHTML = '';
  
  for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
    renderPage(pageNum);
  }
}

function renderPage(pageNum) {
  pdfDoc.getPage(pageNum).then(function(page) {
    const wrapper = document.getElementById('pages-wrapper');
    
    const pageWrapper = document.createElement('div');
    pageWrapper.className = 'page-wrapper';
    pageWrapper.style.position = 'relative';
    pageWrapper.id = 'page-' + pageNum;
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    let viewport = page.getViewport({ scale: 1.5 });
    
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    
    page.render({
      canvasContext: ctx,
      viewport: viewport
    });
    
    pageWrapper.appendChild(canvas);
    
    // Add mask (show only 30%)
    const mask = document.createElement('div');
    mask.className = 'page-mask';
    pageWrapper.appendChild(mask);
    
    // Add watermark
    const watermark = document.createElement('div');
    watermark.className = 'page-watermark';
    watermark.innerHTML = mobile + " | " + session;
    pageWrapper.appendChild(watermark);
    
    wrapper.appendChild(pageWrapper);
    
  }).catch(function(error) {
    console.error("Page " + pageNum + " error:", error);
  });
}

function updatePageInfo() {
  const scrollArea = document.getElementById('scrollable-area');
  const pages = document.querySelectorAll('.page-wrapper');
  
  let visiblePage = 1;
  
  pages.forEach((page, index) => {
    const rect = page.getBoundingClientRect();
    const scrollRect = scrollArea.getBoundingClientRect();
    
    // Check if page is in viewport
    if (rect.top < scrollRect.bottom && rect.bottom > scrollRect.top) {
      visiblePage = index + 1;
    }
  });
  
  document.getElementById('current-page').textContent = Math.min(visiblePage, totalPages);
}

function nextPage() {
  const pages = document.querySelectorAll('.page-wrapper');
  if (currentPageNum < pages.length) {
    currentPageNum++;
    const page = document.getElementById('page-' + currentPageNum);
    if (page) {
      page.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
}

function previousPage() {
  if (currentPageNum > 1) {
    currentPageNum--;
    const page = document.getElementById('page-' + currentPageNum);
    if (page) {
      page.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
}

function scrollToTop() {
  document.getElementById('scrollable-area').scrollTop = 0;
}

const scrollArea = document.getElementById('scrollable-area');
scrollArea.addEventListener('scroll', updatePageInfo);

/* ❌ Right click block */
document.addEventListener("contextmenu", e => e.preventDefault());

/* ❌ Copy shortcut block */
document.onkeydown = function(e) {
  if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) {
    return false;
  }
};

/* ❌ Tab switch block */
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    document.body.innerHTML = "Access Blocked";
  }
});
</script>

</body>
</html>
