<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF Viewer</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #pdf-container {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #scrollable-area {
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      overflow-x: hidden;
    }

    #pages-wrapper {
      padding: 0;
    }

    .page-wrapper {
      position: relative;
      margin: 0;
    }

    canvas {
      display: block;
      margin: 0 auto;
      width: 100%;
    }

    /* ✅ GLOBAL MASK (FIXED) */
    #global-mask {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70%;  /* hide 70% */
      background: black;
      pointer-events: none;
      z-index: 999;
    }

    /* watermark */
    .page-watermark {
      position: absolute;
      top: 40%;
      left: 20%;
      font-size: 28px;
      opacity: 0.2;
      color: white;
      transform: rotate(-30deg);
      pointer-events: none;
      z-index: 1000;
      width: 60%;
      text-align: center;
    }

    #loading {
      text-align: center;
      padding: 40vh 20px;
    }

    .controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.9);
      padding: 10px;
      z-index: 1001;
    }

    .controls button {
      margin: 5px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="pdf-container">
  <div id="scrollable-area">
    <div id="loading">Loading PDF...</div>
    <div id="pages-wrapper"></div>
  </div>
</div>

<!-- ✅ GLOBAL MASK -->
<div id="global-mask"></div>

<div class="controls">
  <button onclick="previousPage()">←</button>
  <button onclick="nextPage()">→</button>
</div>

<script>
const url = "https://raw.githubusercontent.com/sahilcopvt-sudo/secure-pdf/main/ilovepdf_merged%20(1).pdf";

/* watermark */
let mobile = "User";
let session = Math.random().toString(36).substring(2,8).toUpperCase();

let pdfDoc = null;
let currentPageNum = 1;

/* load PDF */
pdfjsLib.getDocument(url).promise.then(function(pdf) {
  pdfDoc = pdf;
  document.getElementById('loading').style.display = 'none';

  for (let i = 1; i <= pdf.numPages; i++) {
    renderPage(i);
  }
});

function renderPage(num) {
  pdfDoc.getPage(num).then(function(page) {

    const wrapper = document.getElementById('pages-wrapper');

    const pageWrapper = document.createElement('div');
    pageWrapper.className = 'page-wrapper';
    pageWrapper.id = 'page-' + num;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    let viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    pageWrapper.appendChild(canvas);

    /* watermark */
    const watermark = document.createElement('div');
    watermark.className = 'page-watermark';
    watermark.innerHTML = mobile + " | " + session;
    pageWrapper.appendChild(watermark);

    wrapper.appendChild(pageWrapper);
  });
}

/* navigation */
function nextPage() {
  currentPageNum++;
  document.getElementById('page-' + currentPageNum)?.scrollIntoView({behavior:"smooth"});
}

function previousPage() {
  currentPageNum--;
  document.getElementById('page-' + currentPageNum)?.scrollIntoView({behavior:"smooth"});
}

/* ❌ disable right click */
document.addEventListener("contextmenu", e => e.preventDefault());

/* ❌ disable copy */
document.onkeydown = function(e) {
  if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) {
    return false;
  }
};

/* ❌ tab switch block */
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    document.body.innerHTML = "Access Blocked";
  }
});
</script>

</body>
</html>
