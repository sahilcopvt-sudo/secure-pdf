<!DOCTYPE html>
<html>
<head>
  <title>Secure Exam Viewer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #login-box {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #login-box input {
      padding: 10px;
      font-size: 16px;
    }

    #login-box button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    #pdf-container {
      display: none;
      height: 100vh;
    }

    #scrollable-area {
      height: 100%;
      overflow-y: scroll;
    }

    canvas {
      width: 100%;
    }

    /* MASK */
    #global-mask {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 70%;
      background: black;
      pointer-events: none;
      z-index: 999;
    }

    /* watermark */
    .watermark {
      position: absolute;
      top: 40%;
      left: 20%;
      opacity: 0.2;
      transform: rotate(-30deg);
      font-size: 28px;
    }

    #timer {
      position: fixed;
      top: 10px;
      left: 10px;
      background: red;
      padding: 10px;
      z-index: 1000;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-box">
  <h2>Enter Mobile Number</h2>
  <input type="text" id="username" />
  <br>
  <button onclick="login()">Start Exam</button>
</div>

<!-- TIMER -->
<div id="timer">30:00</div>

<!-- PDF -->
<div id="pdf-container">
  <div id="scrollable-area">
    <div id="pages"></div>
  </div>
</div>

<!-- MASK -->
<div id="global-mask"></div>

<script>
const url = "https://raw.githubusercontent.com/sahilcopvt-sudo/secure-pdf/main/ilovepdf_merged%20(1).pdf";

let user = null;
let session = Math.random().toString(36).substring(2,8);
let pdfDoc = null;

/* LOGIN */
function login() {
  let name = document.getElementById("username").value;

  if (!name) {
    alert("Enter mobile number");
    return;
  }

  user = name;
  localStorage.setItem("user", name);

  document.getElementById("login-box").style.display = "none";
  document.getElementById("pdf-container").style.display = "block";

  startExam();
}

/* AUTO LOGIN */
window.onload = function() {
  let saved = localStorage.getItem("user");
  if (saved) {
    user = saved;
    document.getElementById("login-box").style.display = "none";
    document.getElementById("pdf-container").style.display = "block";
    startExam();
  }
};

/* START EXAM */
function startExam() {
  loadPDF();
  startTimer();
  startTracking();
}

/* LOAD PDF */
function loadPDF() {
  pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;

    for (let i = 1; i <= pdf.numPages; i++) {
      renderPage(i);
    }
  });
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    let viewport = page.getViewport({scale:1.5});
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({canvasContext: ctx, viewport: viewport});

    let wrapper = document.createElement("div");

    /* watermark */
    let wm = document.createElement("div");
    wm.className = "watermark";
    wm.innerHTML = user + " | " + session;

    wrapper.appendChild(canvas);
    wrapper.appendChild(wm);

    document.getElementById("pages").appendChild(wrapper);
  });
}

/* TIMER */
let time = 30 * 60;

function startTimer() {
  let t = setInterval(() => {

    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("timer").innerText =
      `${m}:${s<10?'0':''}${s}`;

    time--;

    if (time < 0) {
      clearInterval(t);
      endExam();
    }

  },1000);
}

function endExam() {
  alert("Time Over");
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:40vh'>Exam Finished</h1>";
}

/* TRACKING */
function startTracking() {

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      alert("⚠️ Tab switch detected");
    }
  });

  document.addEventListener("keyup", e => {
    if (e.key === "PrintScreen") {
      alert("⚠️ Screenshot attempt detected");
    }
  });
}

/* BLOCK */
document.addEventListener("contextmenu", e => e.preventDefault());

document.onkeydown = function(e) {
  if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) {
    return false;
  }
};
</script>

</body>
</html>
