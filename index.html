<!DOCTYPE html>
<html>
<head>
  <title>PDF Exam Viewer</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #scrollable-area {
      height: 100vh;
      overflow-y: scroll;
    }

    canvas {
      width: 100%;
      display: block;
    }

    /* MASK (only 20% visible) */
    #global-mask {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 80%;
      background: black;
      pointer-events: none;
      z-index: 999;
    }

    /* WATERMARK */
    .watermark {
      position: absolute;
      top: 40%;
      left: 20%;
      opacity: 0.2;
      transform: rotate(-30deg);
      font-size: 28px;
    }

    /* TIMER */
    #timer {
      position: fixed;
      top: 10px;
      left: 10px;
      background: red;
      padding: 10px;
      z-index: 1000;
    }

    /* CONTROLS */
    #controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.9);
      padding: 10px;
      z-index: 1000;
      border-radius: 6px;
    }

    #controls input {
      width: 60px;
      padding: 5px;
    }

    #controls button {
      padding: 5px 10px;
      margin-left: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- TIMER -->
<div id="timer">30:00</div>

<!-- CONTROLS -->
<div id="controls">
  Page: <span id="current-page">1</span> / <span id="total-pages">0</span><br><br>
  <input type="number" id="page-input" placeholder="Go" />
  <button onclick="goToPage()">Go</button>
</div>

<!-- PDF -->
<div id="scrollable-area">
  <div id="pages"></div>
</div>

<!-- MASK -->
<div id="global-mask"></div>

<script>

// ✅ IMPORTANT: Use RAW / CDN link (FIXED)
const url = "https://cdn.jsdelivr.net/gh/sahilcopvt-sudo/secure-pdf@7ef98db2a6a242bee79bb566996627edaea549f3/ilovepdf_merged%20(1).pdf";

let pdfDoc = null;
let totalPages = 0;

// LOAD PDF
pdfjsLib.getDocument(url).promise
.then(pdf => {
  pdfDoc = pdf;
  totalPages = pdf.numPages;

  document.getElementById("total-pages").innerText = totalPages;

  for (let i = 1; i <= totalPages; i++) {
    renderPage(i);
  }
})
.catch(err => {
  console.error("PDF Load Error:", err);
  alert("PDF not loading. Check console (F12)");
});

// RENDER PAGE
function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    let viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({ canvasContext: ctx, viewport: viewport });

    let wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.id = "page-" + num;

    let wm = document.createElement("div");
    wm.className = "watermark";
    wm.innerHTML = "User";

    wrapper.appendChild(canvas);
    wrapper.appendChild(wm);

    document.getElementById("pages").appendChild(wrapper);
  });
}

// GO TO PAGE
function goToPage() {
  let page = parseInt(document.getElementById("page-input").value);

  if (!page || page < 1 || page > totalPages) {
    alert("Invalid page");
    return;
  }

  document.getElementById("page-" + page).scrollIntoView({ behavior: "smooth" });
}

// AUTO PAGE NUMBER UPDATE
document.getElementById("scrollable-area").addEventListener("scroll", () => {
  let pages = document.querySelectorAll("[id^='page-']");
  let scrollTop = document.getElementById("scrollable-area").scrollTop;

  pages.forEach((p, i) => {
    if (p.offsetTop <= scrollTop + 100) {
      document.getElementById("current-page").innerText = i + 1;
    }
  });
});

// TIMER
let time = 30 * 60;

setInterval(() => {
  let m = Math.floor(time / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    `${m}:${s < 10 ? '0' : ''}${s}`;

  time--;

  if (time < 0) {
    alert("Time Over");
    document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>Exam Finished</h1>";
  }
}, 1000);

// DISABLE RIGHT CLICK
document.addEventListener("contextmenu", e => e.preventDefault());

</script>

</body>
</html>
