<!DOCTYPE html>
<html>
<head>
  <title>PDF Exam Viewer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #pdf-container {
      height: 100vh;
    }

    #scrollable-area {
      height: 100%;
      overflow-y: scroll;
    }

    canvas {
      width: 100%;
      display: block;
    }

    /* 🔥 ONLY 20% VISIBLE */
    #global-mask {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 80%;
      background: black;
      pointer-events: none;
      z-index: 999;
    }

    /* watermark */
    .watermark {
      position: absolute;
      top: 40%;
      left: 20%;
      opacity: 0.2;
      transform: rotate(-30deg);
      font-size: 28px;
      color: white;
    }

    /* timer */
    #timer {
      position: fixed;
      top: 10px;
      left: 10px;
      background: red;
      padding: 10px;
      z-index: 1000;
    }

    /* controls */
    #controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.9);
      padding: 10px;
      z-index: 1000;
      border-radius: 6px;
    }

    #controls input {
      width: 60px;
      padding: 5px;
    }

    #controls button {
      padding: 5px 10px;
      margin-left: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- TIMER -->
<div id="timer">30:00</div>

<!-- CONTROLS -->
<div id="controls">
  Page: <span id="current-page">1</span> / <span id="total-pages">0</span><br><br>
  <input type="number" id="page-input" placeholder="Go" />
  <button onclick="goToPage()">Go</button>
</div>

<!-- PDF -->
<div id="pdf-container">
  <div id="scrollable-area">
    <div id="pages"></div>
  </div>
</div>

<!-- MASK -->
<div id="global-mask"></div>

<script>
const url = "https://github.com/sahilcopvt-sudo/secure-pdf/blob/7ef98db2a6a242bee79bb566996627edaea549f3/ilovepdf_merged%20(1).pdf
";
  
let pdfDoc = null;
let totalPages = 0;

/* LOAD PDF */
pdfjsLib.getDocument(url).promise.then(pdf => {
  pdfDoc = pdf;
  totalPages = pdf.numPages;

  document.getElementById("total-pages").innerText = totalPages;

  for (let i = 1; i <= totalPages; i++) {
    renderPage(i);
  }
});

/* RENDER */
function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    let viewport = page.getViewport({scale:1.5});
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({canvasContext: ctx, viewport: viewport});

    let wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.id = "page-" + num;

    let wm = document.createElement("div");
    wm.className = "watermark";
    wm.innerHTML = "User";

    wrapper.appendChild(canvas);
    wrapper.appendChild(wm);

    document.getElementById("pages").appendChild(wrapper);
  });
}

/* GO TO PAGE */
function goToPage() {
  let page = document.getElementById("page-input").value;

  if (page < 1 || page > totalPages) {
    alert("Invalid page");
    return;
  }

  document.getElementById("page-" + page).scrollIntoView({behavior:"smooth"});
}

/* AUTO PAGE UPDATE */
document.getElementById("scrollable-area").addEventListener("scroll", () => {
  let pages = document.querySelectorAll("[id^='page-']");
  let scrollTop = document.getElementById("scrollable-area").scrollTop;

  pages.forEach((p, i) => {
    if (p.offsetTop <= scrollTop + 100) {
      document.getElementById("current-page").innerText = i + 1;
    }
  });
});

/* TIMER */
let time = 30 * 60;

setInterval(() => {
  let m = Math.floor(time / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    `${m}:${s<10?'0':''}${s}`;

  time--;

  if (time < 0) {
    alert("Time Over");
    document.body.innerHTML = "Exam Finished";
  }
},1000);

/* BLOCK */
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
