<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF Viewer</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: auto;
    }

    /* 30% visible */
    #mask {
      position: absolute;
      top: 30%;
      width: 100%;
      height: 70%;
      background: black;
    }

    /* watermark */
    #watermark {
      position: fixed;
      top: 40%;
      left: 20%;
      font-size: 28px;
      opacity: 0.2;
      color: white;
      transform: rotate(-30deg);
      pointer-events: none;
    }
  </style>
</head>

<body>

<canvas id="pdf-canvas"></canvas>
<div id="mask"></div>
<div id="watermark"></div>

<script>
/* 🔥 IMPORTANT: yaha apna PDF link daalo */
const url = "https://github.com/sahilcopvt-sudo/secure-pdf/blob/8113ba74191381e72f435bf6aae3c9d9b17ae15a/ilovepdf_merged%20(1).pdf";

/* 👤 Watermark */
let mobile = "User"; // yaha mobile dynamic kar sakte ho
let session = Math.random().toString(36).substring(2,8).toUpperCase();

document.getElementById("watermark").innerHTML =
  mobile + " | " + session;

/* 📄 PDF load */
pdfjsLib.getDocument(url).promise.then(function(pdf) {
  pdf.getPage(1).then(function(page) {

    let canvas = document.getElementById("pdf-canvas");
    let ctx = canvas.getContext("2d");

    let viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

  });
});

/* ❌ Right click block */
document.addEventListener("contextmenu", e => e.preventDefault());

/* ❌ Copy shortcut block */
document.onkeydown = function(e) {
  if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) {
    return false;
  }
};

/* ❌ Tab switch block */
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    document.body.innerHTML = "Access Blocked";
  }
});
</script>

</body>
</html>
